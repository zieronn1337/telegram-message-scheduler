{% extends "base.html" %}{% block title %}Вход — TelePlan{% endblock %}
{% block auth_content %}<div class="login-page"><div class="login-card"><div class="brand justify-content-center mb-4"><span class="brand-icon"><i class="bi bi-send-fill"></i></span><span>TelePlan</span></div><h2>Вход в панель</h2><p class="text-secondary">Управляйте публикациями Telegram в одном месте</p>{% if flash %}<div class="alert alert-{{ flash.category }}">{{ flash.message }}</div>{% endif %}<form method="post" action="/login"><label class="form-label">Логин</label><input class="form-control mb-3" name="username" required autofocus><label class="form-label">Пароль</label><input class="form-control mb-4" type="password" name="password" required><button class="btn btn-primary w-100 py-2">Войти</button></form></div></div>{% endblock %}
