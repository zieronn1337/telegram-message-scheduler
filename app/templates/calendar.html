{% extends "base.html" %}{% block page_title %}Календарь{% endblock %}{% block page_subtitle %}Публикации по дням, неделям и месяцам{% endblock %}
{% block head %}<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">{% endblock %}
{% block content %}<div class="panel p-4"><div class="filters mb-4"><select class="form-select" id="channelFilter"><option value="">Все каналы</option>{% for c in channels %}<option value="{{c.id}}">{{c.title}}</option>{% endfor %}</select><select class="form-select" id="statusFilter"><option value="">Все статусы</option>{% for s in statuses %}<option value="{{s.value}}">{{s.value}}</option>{% endfor %}</select></div><div id="calendar"></div></div>{% endblock %}
{% block scripts %}<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script><script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales/ru.global.min.js"></script><script>const events={{ posts|map(attribute='id')|list|tojson }}.map(()=>null); const source=[{% for p in posts %}{id:'{{p.id}}',title:{{(p.channel.title ~ ': ' ~ (p.text|striptags|truncate(35)))|tojson}},start:'{{p.scheduled_at.isoformat()}}',classNames:['event-{{p.status.value}}'],extendedProps:{channel:'{{p.channel_id}}',status:'{{p.status.value}}'}},{% endfor %}]; const cal=new FullCalendar.Calendar(document.getElementById('calendar'),{locale:'ru',initialView:'dayGridMonth',headerToolbar:{left:'prev,next today',center:'title',right:'dayGridMonth,timeGridWeek,timeGridDay'},events:source,height:'auto'});cal.render(); function apply(){const c=document.getElementById('channelFilter').value,s=document.getElementById('statusFilter').value;cal.removeAllEvents();cal.addEventSource(source.filter(e=>(!c||e.extendedProps.channel===c)&&(!s||e.extendedProps.status===s)));}document.querySelectorAll('#channelFilter,#statusFilter').forEach(e=>e.addEventListener('change',apply));</script>{% endblock %}
